<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Courses</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
  <div class="container">
    <h2>Approved Courses</h2>

    <nav>
      <a href="./dashboard.html">Dashboard</a>
      <button class="small" type="button" onclick="logout()">Logout</button>
    </nav>

    <hr />

    <div id="list">Loading...</div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/guards.js"></script>

    <script>
      const listEl = document.getElementById("list");

      function esc(v) {
        return String(v ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      (async () => {
        await requireRole("student");

        const data = await api("/api/student/courses");
        const courses = data.courses || [];

        if (courses.length === 0) {
          listEl.innerHTML = `<div class="card"><p>No courses available.</p></div>`;
          return;
        }

        listEl.innerHTML = courses.map(c => `
          <div class="card">
            <b>${esc(c.title)}</b> (${esc(c.level)})<br/>
            ${esc(c.category_name)} — ${esc(c.instructor_name)}<br/>
            Rating: ${esc(c.avg_rating)} (${esc(c.review_count)} reviews)<br/><br/>
            <a href="./course.html?id=${encodeURIComponent(c.id)}">Open Course →</a>
          </div>
        `).join("");
      })().catch(e => alert(e.message));
    </script>
  </div>
</body>
</html>
