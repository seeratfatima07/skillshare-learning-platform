<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Enrollments</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
  <div class="container">
    <h2>My Enrollments</h2>

    <nav>
      <a href="./dashboard.html">Dashboard</a>
      <a href="./courses.html">Browse Courses</a>
      <a href="./profile.html">Profile</a>
      <button class="small" type="button" onclick="logout()">Logout</button>
    </nav>

    <hr />

    <div id="list">Loading...</div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/guards.js"></script>

    <script>
      const listEl = document.getElementById("list");

      function esc(v) {
        return String(v ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      (async () => {
        await requireRole("student");

        const data = await api("/api/student/enrollments");
        const enrollments = data.enrollments || [];

        if (enrollments.length === 0) {
          listEl.innerHTML = `<div class="card"><p>No enrollments yet.</p></div>`;
          return;
        }

        listEl.innerHTML = enrollments.map(e => `
          <div class="card">
            <b>${esc(e.title)}</b> (${esc(e.level)})<br/>
            ${esc(e.category_name)} — ${esc(e.instructor_name)}<br/>
            <small>Enrolled: ${new Date(e.enrolled_at).toLocaleString()}</small><br/><br/>
            <a href="./course.html?id=${encodeURIComponent(e.course_id)}">Open Course →</a>
          </div>
        `).join("");
      })().catch(e => alert(e.message));
    </script>
  </div>
</body>
</html>
