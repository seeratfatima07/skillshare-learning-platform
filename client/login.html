<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Login</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <div class="container">
  <h2>Login</h2>

  <form id="loginForm">
    <input id="email" type="email" placeholder="Email" required />
    <input id="password" type="password" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>

  <p><a href="./signup.html">Create account</a></p>

  <script src="./assets/js/config.js"></script>
  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/auth.js"></script>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  try {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim(); // ✅ important

    const user = await login(email, password); // login returns user
    alert("Login ok");

    if (user.role === "student") location.href = "./student/dashboard.html";
    else if (user.role === "instructor") location.href = "./instructor/dashboard.html";
    else if (user.role === "admin") location.href = "./admin/dashboard.html";
  } catch (err) {
    alert(err.message);
  }
});

  </script>
</div>
</body>
</html>
