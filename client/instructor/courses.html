<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Courses</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
  <div class="container">
    <h2>My Courses</h2>

    <nav>
      <a href="./dashboard.html">Dashboard</a>
      <a href="./course-edit.html">Create Course</a>
      <button class="small" type="button" onclick="logout()">Logout</button>
    </nav>

    <hr />

    <div id="list">Loading...</div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/guards.js"></script>

    <script>
      const listEl = document.getElementById("list");

      function esc(v) {
        return String(v ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function statusClass(status) {
        if (status === "approved") return "status-approved";
        if (status === "pending") return "status-pending";
        if (status === "rejected") return "status-rejected";
        return "";
      }

      (async () => {
        await requireRole("instructor");

        const data = await api("/api/instructor/courses");
        const courses = data.courses || [];

        if (courses.length === 0) {
          listEl.innerHTML = `<div class="card"><p>No courses yet.</p></div>`;
          return;
        }

        listEl.innerHTML = courses.map(c => `
          <div class="card">
            <b>${esc(c.title)}</b> (${esc(c.level)})<br/>

            Status:
            <span class="${statusClass(c.status)}">${esc(c.status)}</span>
            &nbsp;|&nbsp;
            Active: <b>${esc(c.is_active)}</b><br/>

            Category: ${esc(c.category_name || "—")}<br/><br/>

            <div style="display:flex; gap:12px; flex-wrap:wrap;">
              <a href="./course-edit.html?id=${encodeURIComponent(c.id)}">Edit + Lessons</a>
              <a href="./course-students.html?id=${encodeURIComponent(c.id)}">Students</a>
              <a href="./course-reviews.html?id=${encodeURIComponent(c.id)}">Reviews</a>
            </div>
          </div>
        `).join("");
      })().catch(e => alert(e.message));
    </script>
  </div>
</body>
</html>
